<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <a href="/">← 返回首页</a>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">发布时间：{{ page.date | date: "%Y-%m-%d" }}</p>
    </header>
    <main class="post-content">
      {{ content }}
    </main>
  </div>
</body>
</html>
